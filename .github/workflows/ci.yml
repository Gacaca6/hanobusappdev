# HanoBus CI Pipeline — Tech Builder Program 2026
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: |
          if npm run | grep -q "^  typecheck$"; then
            npm run typecheck
          else
            echo "No typecheck script; skipping."
          fi

      - name: Lint
        run: |
          if npm run | grep -q "^  lint$"; then
            npm run lint || echo "Lint reported issues (non-blocking for now)."
          else
            echo "No lint script; skipping."
          fi

      - name: Test
        run: |
          if npm run | grep -q "^  test$"; then
            npm test
          else
            echo "Tests coming soon."
          fi

      - name: Build
        run: npm run build
