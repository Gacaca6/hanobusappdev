<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <g transform="translate(16,15)" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bus body -->
    <rect x="-9" y="-10" width="18" height="16" rx="3"/>
    <!-- Top bar -->
    <line x1="-9" y1="-5" x2="9" y2="-5"/>
    <!-- Windows -->
    <rect x="-7" y="-9" width="5.5" height="3.5" rx="1"/>
    <rect x="1.5" y="-9" width="5.5" height="3.5" rx="1"/>
    <!-- Headlights -->
    <circle cx="-6" cy="-2" r="1" fill="white"/>
    <circle cx="6" cy="-2" r="1" fill="white"/>
    <!-- Lower grille -->
    <line x1="-6" y1="1" x2="6" y2="1"/>
    <!-- Wheels -->
    <circle cx="-5" cy="7.5" r="2" fill="white"/>
    <circle cx="5" cy="7.5" r="2" fill="white"/>
  </g>
</svg>