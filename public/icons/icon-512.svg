<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256,230)" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <!-- Bus body -->
    <rect x="-100" y="-120" width="200" height="190" rx="32"/>
    <!-- Horizontal divider below windows -->
    <line x1="-100" y1="-46" x2="100" y2="-46"/>
    <!-- Left window -->
    <rect x="-82" y="-106" width="64" height="50" rx="12"/>
    <!-- Right window -->
    <rect x="18" y="-106" width="64" height="50" rx="12"/>
    <!-- Headlights -->
    <circle cx="-66" cy="-18" r="12" fill="white"/>
    <circle cx="66" cy="-18" r="12" fill="white"/>
    <!-- Grille lines -->
    <line x1="-66" y1="14" x2="66" y2="14"/>
    <line x1="-66" y1="34" x2="66" y2="34"/>
    <!-- Bumper -->
    <line x1="-86" y1="56" x2="86" y2="56"/>
    <!-- Wheels -->
    <circle cx="-54" cy="78" r="24" fill="white"/>
    <circle cx="-54" cy="78" r="10" fill="#2563eb"/>
    <circle cx="54" cy="78" r="24" fill="white"/>
    <circle cx="54" cy="78" r="10" fill="#2563eb"/>
  </g>
  <!-- App name -->
  <text x="256" y="442" text-anchor="middle" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">HanoBus</text>
</svg>