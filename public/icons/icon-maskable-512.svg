<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Bus in safe zone (inner 80%) -->
  <g transform="translate(256,224)" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bus body -->
    <rect x="-82" y="-98" width="164" height="156" rx="26"/>
    <!-- Horizontal divider below windows -->
    <line x1="-82" y1="-38" x2="82" y2="-38"/>
    <!-- Left window -->
    <rect x="-66" y="-86" width="52" height="40" rx="10"/>
    <!-- Right window -->
    <rect x="14" y="-86" width="52" height="40" rx="10"/>
    <!-- Headlights -->
    <circle cx="-54" cy="-14" r="10" fill="white"/>
    <circle cx="54" cy="-14" r="10" fill="white"/>
    <!-- Grille lines -->
    <line x1="-54" y1="12" x2="54" y2="12"/>
    <line x1="-54" y1="28" x2="54" y2="28"/>
    <!-- Bumper -->
    <line x1="-70" y1="46" x2="70" y2="46"/>
    <!-- Wheels -->
    <circle cx="-44" cy="64" r="20" fill="white"/>
    <circle cx="-44" cy="64" r="8" fill="#2563eb"/>
    <circle cx="44" cy="64" r="20" fill="white"/>
    <circle cx="44" cy="64" r="8" fill="#2563eb"/>
  </g>
  <!-- App name -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-1">HanoBus</text>
</svg>