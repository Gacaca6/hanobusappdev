<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <g transform="translate(96,88)" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bus body -->
    <rect x="-42" y="-48" width="84" height="78" rx="14"/>
    <!-- Horizontal divider below windows -->
    <line x1="-42" y1="-18" x2="42" y2="-18"/>
    <!-- Left window -->
    <rect x="-34" y="-42" width="26" height="20" rx="5"/>
    <!-- Right window -->
    <rect x="8" y="-42" width="26" height="20" rx="5"/>
    <!-- Headlights -->
    <circle cx="-28" cy="-6" r="5" fill="white"/>
    <circle cx="28" cy="-6" r="5" fill="white"/>
    <!-- Grille line -->
    <line x1="-28" y1="8" x2="28" y2="8"/>
    <line x1="-28" y1="16" x2="28" y2="16"/>
    <!-- Wheels -->
    <circle cx="-22" cy="34" r="10" fill="white"/>
    <circle cx="-22" cy="34" r="4" fill="#2563eb"/>
    <circle cx="22" cy="34" r="10" fill="white"/>
    <circle cx="22" cy="34" r="4" fill="#2563eb"/>
    <!-- Bumper -->
    <line x1="-36" y1="24" x2="36" y2="24"/>
  </g>
  <!-- App name -->
  <text x="96" y="168" text-anchor="middle" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">HanoBus</text>
</svg>