<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Bus body -->
  <g transform="translate(96,82)">
    <!-- Main body -->
    <rect x="-38" y="-46" width="76" height="82" rx="14" fill="white"/>
    <!-- Windshield -->
    <rect x="-28" y="-38" width="56" height="30" rx="8" fill="#93c5fd"/>
    <!-- Windshield divider -->
    <rect x="-1" y="-38" width="2" height="30" fill="white" opacity="0.6"/>
    <!-- Headlights -->
    <rect x="-32" y="-10" width="10" height="6" rx="3" fill="#fbbf24"/>
    <rect x="22" y="-10" width="10" height="6" rx="3" fill="#fbbf24"/>
    <!-- Windows -->
    <rect x="-28" y="0" width="18" height="14" rx="4" fill="#bfdbfe"/>
    <rect x="10" y="0" width="18" height="14" rx="4" fill="#bfdbfe"/>
    <!-- Door -->
    <rect x="-5" y="0" width="10" height="20" rx="3" fill="#dbeafe"/>
    <!-- Bumper -->
    <rect x="-32" y="22" width="64" height="6" rx="3" fill="#e2e8f0"/>
    <!-- Wheels -->
    <circle cx="-20" cy="34" r="9" fill="#374151"/>
    <circle cx="-20" cy="34" r="4.5" fill="#6b7280"/>
    <circle cx="20" cy="34" r="9" fill="#374151"/>
    <circle cx="20" cy="34" r="4.5" fill="#6b7280"/>
  </g>
  <!-- App name -->
  <text x="96" y="162" text-anchor="middle" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">HanoBus</text>
</svg>
